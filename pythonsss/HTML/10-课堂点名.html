<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课堂点名</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #eef4ff, #f8fbff);
            color: #1f2937;
            font-size: 19px;
        }

        .container {
            width: calc(100vw - 48px);
            max-width: none;
            margin: 20px auto;
            padding: 10px;
        }

        .card {
            background: #ffffff;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
            margin-bottom: 20px;
        }

        h1, h2 {
            margin-top: 0;
        }

        h1 {
            font-size: 44px;
        }

        h2 {
            font-size: 34px;
        }

        textarea {
            width: 100%;
            min-height: 220px;
            padding: 14px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            resize: vertical;
            font-size: 20px;
        }

        .actions {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        button {
            border: none;
            border-radius: 10px;
            padding: 16px 26px;
            font-size: 20px;
            cursor: pointer;
            background: #2563eb;
            color: #ffffff;
        }

        #pickBtn {
            min-width: 148px;
            text-align: center;
        }

        button.secondary {
            background: #64748b;
        }

        button.danger {
            background: #dc2626;
        }

        .result {
            font-size: 56px;
            font-weight: bold;
            color: #2563eb;
            text-align: center;
            padding: 32px 16px;
            min-height: 124px;
        }

        ul {
            padding-left: 20px;
            line-height: 1.8;
            font-size: 22px;
        }

        .empty {
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>点名记录</h2>
            <ul id="historyList">
                <li class="empty">暂无记录</li>
            </ul>
        </div>

        <div class="card">
            <h2>剩余名单</h2>
            <ul id="remainingList"></ul>
        </div>

        <div class="card">
            <h1>课堂点名</h1>
            <div id="result" class="result">等待点名...</div>
            <div class="actions">
                <button id="pickBtn">开始点名</button>
                <button id="removeBtn" class="secondary">点过后移出名单</button>
                <button id="resetBtn" class="danger">重置</button>
            </div>
        </div>
    </div>
    <script>
        const defaultNames = ["张三", "李四", "王五", "赵六", "小明", "小红"];
        const pickBtn = document.getElementById("pickBtn");
        const removeBtn = document.getElementById("removeBtn");
        const resetBtn = document.getElementById("resetBtn");
        const result = document.getElementById("result");
        const remainingList = document.getElementById("remainingList");
        const historyList = document.getElementById("historyList");

        let removeAfterPick = true;
        let history = [];
        let remainingNames = [...defaultNames];
        let rollingTimer = null;

        function updateRemoveBtnState() {
            removeBtn.textContent = removeAfterPick ? "已开启：点过后移出名单" : "点过后移出名单";
            removeBtn.style.background = removeAfterPick ? "#16a34a" : "#64748b";
        }

        function resetToDefaultNames() {
            remainingNames = [...defaultNames];
        }

        function renderRemaining() {
            if (remainingNames.length === 0) {
                remainingList.innerHTML = '<li class="empty">当前没有学生名单</li>';
                return;
            }

            remainingList.innerHTML = remainingNames
                .map(name => `<li>${name}</li>`)
                .join("");
        }

        function renderHistory() {
            if (history.length === 0) {
                historyList.innerHTML = '<li class="empty">暂无记录</li>';
                return;
            }

            historyList.innerHTML = history
                .map((name, index) => `<li>第 ${index + 1} 次：${name}</li>`)
                .join("");
        }

        function pickRandomName() {
            if (remainingNames.length === 0) {
                result.textContent = "当前没有可点名学生";
                return;
            }

            const selectedName = result.textContent;
            const selectedIndex = remainingNames.indexOf(selectedName);

            if (selectedIndex === -1) {
                result.textContent = "请重新开始点名";
                return;
            }

            history.push(selectedName);
            renderHistory();

            if (removeAfterPick) {
                remainingNames.splice(selectedIndex, 1);
                renderRemaining();
            }
        }

        function startRolling() {
            if (remainingNames.length === 0) {
                result.textContent = "当前没有可点名学生";
                return;
            }

            pickBtn.textContent = "停止";
            rollingTimer = setInterval(() => {
                if (remainingNames.length === 0) {
                    stopRolling(false);
                    result.textContent = "当前没有可点名学生";
                    return;
                }

                const randomIndex = Math.floor(Math.random() * remainingNames.length);
                result.textContent = remainingNames[randomIndex];
            }, 80);
        }

        function stopRolling(shouldPick = true) {
            if (rollingTimer === null) {
                return;
            }

            clearInterval(rollingTimer);
            rollingTimer = null;
            pickBtn.textContent = "开始点名";

            if (shouldPick) {
                pickRandomName();
            }
        }

        pickBtn.addEventListener("click", () => {
            if (rollingTimer === null) {
                startRolling();
                return;
            }

            stopRolling(true);
        });

        removeBtn.addEventListener("click", () => {
            removeAfterPick = !removeAfterPick;
            updateRemoveBtnState();
        });

        resetBtn.addEventListener("click", () => {
            history = [];
            stopRolling(false);
            result.textContent = "等待点名...";
            resetToDefaultNames();
            renderHistory();
            renderRemaining();
        });

        resetToDefaultNames();
        updateRemoveBtnState();
        renderRemaining();
        renderHistory();
    </script>
</body>
</html>
