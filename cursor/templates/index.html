<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>燕云心力计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', '微软雅黑', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .info-box {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: #555;
        }

        .info-item:last-child {
            margin-bottom: 0;
        }

        .info-label {
            font-weight: bold;
            color: #333;
        }

        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
            font-size: 16px;
        }

        input[type="number"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 18px;
            transition: border-color 0.3s;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 15px;
        }

        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-calculate {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-calculate:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-reset {
            background: #f0f0f0;
            color: #333;
        }

        .btn-reset:hover {
            background: #e0e0e0;
        }

        .result-box {
            margin-top: 30px;
            padding: 25px;
            border-radius: 10px;
            display: none;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-box.show {
            display: block;
        }

        .result-success {
            background: #d4edda;
            border: 2px solid #c3e6cb;
            color: #155724;
        }

        .result-error {
            background: #f8d7da;
            border: 2px solid #f5c6cb;
            color: #721c24;
        }

        .result-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
        }

        .result-item {
            margin-bottom: 12px;
            font-size: 16px;
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-value {
            font-weight: bold;
            color: #667eea;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ 燕云心力计算器</h1>
        <p class="subtitle">计算下次满心力的时间</p>

        <div class="info-box">
            <div class="info-item">
                <span class="info-label">心力上限：</span>
                <span>600点</span>
            </div>
            <div class="info-item">
                <span class="info-label">恢复速度：</span>
                <span>每8分钟恢复1点</span>
            </div>
            <div class="info-item">
                <span class="info-label">当前时间：</span>
                <span id="current-time">--:--:--</span>
            </div>
        </div>

        <div class="input-group">
            <label for="xinli-input">当前心力点数（0-600）</label>
            <input type="number" id="xinli-input" min="0" max="600" placeholder="请输入当前心力点数">
        </div>

        <div class="button-group">
            <button class="btn-calculate" onclick="calculate()">计算</button>
            <button class="btn-reset" onclick="reset()">重置</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
        </div>

        <div class="result-box" id="result-box">
            <div class="result-title" id="result-title"></div>
            <div id="result-content"></div>
        </div>
    </div>

    <script>
        // 更新时间显示
        function updateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('current-time').textContent = `${hours}:${minutes}:${seconds}`;
        }

        // 每秒更新时间
        setInterval(updateTime, 1000);
        updateTime();

        // 计算函数
        async function calculate() {
            const xinliInput = document.getElementById('xinli-input');
            const currentXinli = parseInt(xinliInput.value);

            // 验证输入
            if (isNaN(currentXinli) || currentXinli < 0 || currentXinli > 600) {
                showResult(false, '请输入有效的数字（0-600）！');
                return;
            }

            // 显示加载动画
            document.getElementById('loading').classList.add('show');
            document.getElementById('result-box').classList.remove('show');

            try {
                const response = await fetch('/api/calculate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ current_xinli: currentXinli })
                });

                const data = await response.json();

                // 隐藏加载动画
                document.getElementById('loading').classList.remove('show');

                if (data.success) {
                    showSuccessResult(data);
                } else {
                    showResult(false, data.message);
                }
            } catch (error) {
                document.getElementById('loading').classList.remove('show');
                showResult(false, '网络错误，请稍后重试！');
            }
        }

        // 显示成功结果
        function showSuccessResult(data) {
            const resultBox = document.getElementById('result-box');
            const resultTitle = document.getElementById('result-title');
            const resultContent = document.getElementById('result-content');

            resultTitle.textContent = '📊 计算结果';
            resultBox.className = 'result-box result-success show';

            resultContent.innerHTML = `
                <div class="result-item">
                    <span>当前心力：</span>
                    <span class="result-value">${data.current_xinli}点</span>
                </div>
                <div class="result-item">
                    <span>当前时间：</span>
                    <span class="result-value">${data.current_time}</span>
                </div>
                <div class="result-item">
                    <span>需要恢复：</span>
                    <span class="result-value">${data.points_needed}点</span>
                </div>
                <div class="result-item">
                    <span>恢复时间：</span>
                    <span class="result-value">${data.minutes_needed}分钟 (${data.hours}小时${data.minutes}分钟)</span>
                </div>
                <div class="result-item">
                    <span>下次满心力时间：</span>
                    <span class="result-value">${data.full_xinli_time}</span>
                </div>
                <div class="result-item">
                    <span>完整时间：</span>
                    <span class="result-value">${data.full_xinli_datetime}</span>
                </div>
                <div class="result-item">
                    <span>星期几：</span>
                    <span class="result-value">${data.weekday}</span>
                </div>
            `;
        }

        // 显示错误结果
        function showResult(success, message) {
            const resultBox = document.getElementById('result-box');
            const resultTitle = document.getElementById('result-title');
            const resultContent = document.getElementById('result-content');

            resultTitle.textContent = success ? '✅ 成功' : '❌ 错误';
            resultBox.className = `result-box ${success ? 'result-success' : 'result-error'} show`;
            resultContent.innerHTML = `<div style="text-align: center; font-size: 16px;">${message}</div>`;
        }

        // 重置函数
        function reset() {
            document.getElementById('xinli-input').value = '';
            document.getElementById('result-box').classList.remove('show');
            document.getElementById('xinli-input').focus();
        }

        // 回车键计算
        document.getElementById('xinli-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                calculate();
            }
        });
    </script>
</body>
</html>
